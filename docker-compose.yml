services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: fastapi_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_USER: postgres
      DB_NAME: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
      DB_HOST: db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  daily-pipeline:
    build:
      context: .
      dockerfile: ./collection/daily_pipeline/Dockerfile
    container_name: daily_pipeline
    restart: "no"
    depends_on:
      - backend
    environment:
      DB_USER: postgres
      DB_NAME: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
      DB_HOST: db

  hourly-pipeline:
    build:
      context: .
      dockerfile: ./collection/hourly_pipeline/Dockerfile
    container_name: hourly_pipeline
    restart: "no"
    depends_on:
      - daily-pipeline
    environment:
      DB_USER: postgres
      DB_NAME: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
      DB_HOST: db

  yearly-pipeline:
    build:
      context: .
      dockerfile: ./collection/yearly_pipeline/Dockerfile
    container_name: yearly_pipeline
    restart: "no"
    depends_on:
      - daily-pipeline
    environment:
      DB_USER: postgres
      DB_NAME: postgres
      DB_PORT: 5432
      DB_PASSWORD: postgres
      DB_HOST: db

volumes:
  postgres_data: